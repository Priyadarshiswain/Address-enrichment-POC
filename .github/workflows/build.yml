name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore AddressEnrichment.Api.csproj

      - name: Build
        run: dotnet build AddressEnrichment.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests/AddressEnrichment.Api.Tests/AddressEnrichment.Api.Tests.csproj --no-build -c Debug

  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
