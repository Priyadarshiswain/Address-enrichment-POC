name: Deploy POC

on:
  push:
    branches: [deploy/poc-demo]

jobs:
  deploy-backend:
    name: Backend — Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish app/AddressEnrichment.Api.csproj -c Release -o ./publish

      - name: Zip publish output
        run: cd publish && zip -r ../publish.zip .

      - name: Azure Login
        run: az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Deploy to Azure App Service
        run: az webapp deploy --name app-address-enrichment-poc --resource-group rg-address-enrichment-poc --src-path publish.zip --type zip --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-frontend:
    name: Frontend — Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ui/dist/dhl-address-enrichment/browser
          skip_app_build: true
